<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insights | OnePoint</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-7JZTFMLYE6"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}

<body class="bg-white text-slate-800">

  <div id="header-placeholder"></div>

  <main class="max-w-5xl mx-auto px-6 py-20">
    
    <div class="text-center mb-16">
      <span class="text-xs font-bold uppercase tracking-[0.2em] text-indigo-600">The OnePoint Journal</span>
      <h1 class="text-4xl md:text-6xl font-black text-[#0F172A] mt-4 mb-6">Architecture Insights</h1>
      <p class="text-slate-500 text-lg max-w-2xl mx-auto">Engineering notes, design updates, and platform explorations from our development team.</p>
    </div>

    <div id="blog-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
      </div>
  </main>

  <div id="blog-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/50 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300">
    <div class="bg-white max-w-2xl w-full max-h-[90vh] rounded-3xl shadow-2xl flex flex-col overflow-hidden text-slate-900">
      
      <div class="p-6 flex justify-end">
        <button onclick="closeBlogModal()" class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 hover:bg-slate-200 transition-colors font-bold text-slate-600">
          ✕
        </button>
      </div>

      <div id="modal-content" class="overflow-y-auto px-6 pb-8 space-y-6">
        <div id="modal-images" class="flex gap-4 overflow-x-auto pb-4 snap-x">
          </div>
        <h2 id="modal-title" class="text-3xl font-black text-slate-900"></h2>
        <div id="modal-body" class="text-slate-600 leading-relaxed"></div>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>
  
  <script src="components.js"></script>
 <script>
  // Global memory cache to hold blog objects so the modal can read them instantly
  let localBlogsCache = [];

  // MODAL CORE INTERACTION PIPELINE
  function openBlogModal(blogId) {
    const modal = document.getElementById('blog-modal');
    const titleEl = document.getElementById('modal-title');
    const bodyEl = document.getElementById('modal-body');
    const imagesContainer = document.getElementById('modal-images');

    // Find the specific blog entry from our engine cache
    const blog = localBlogsCache.find(b => String(b.id) === String(blogId));
    if (!blog) return;

    // Inject Text Content safely
    titleEl.innerText = blog.title || 'Untitled Entry';
    bodyEl.innerText = blog.content || '';

    // Handle Multi-Image Array rendering inside the modal view context
    imagesContainer.innerHTML = '';
    const images = blog.image_url ? blog.image_url.split(',') : [];
    
    if (images.length > 0) {
      imagesContainer.classList.remove('hidden');
      images.forEach(imgUrl => {
        if (!imgUrl) return;
        const imgObj = document.createElement('img');
        imgObj.src = imgUrl;
        imgObj.className = "w-full h-64 object-cover rounded-2xl snap-center shrink-0 border border-slate-100 shadow-sm";
        imagesContainer.appendChild(imgObj);
      });
    } else {
      imagesContainer.classList.add('hidden');
    }

    // Trigger visual reveal animations
    modal.classList.remove('opacity-0', 'pointer-events-none');
    modal.querySelector('div').classList.remove('scale-95');
    modal.querySelector('div').classList.add('scale-100');
  }

  function closeBlogModal() {
    const modal = document.getElementById('blog-modal');
    modal.classList.add('opacity-0', 'pointer-events-none');
    modal.querySelector('div').classList.add('scale-95');
    modal.querySelector('div').classList.remove('scale-100');
  }

  // DYNAMIC FEED DATA SYNC ENGINE
  async function loadBlogs() {
    const SUPABASE_URL = "https://menkhsukpmqkvfirbatm.supabase.co/rest/v1/blog?select=*&order=id.desc";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1lbmtoc3VrcG1xa3ZmaXJiYXRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMTA5NDEsImV4cCI6MjA5NTg4Njk0MX0.EVx7nAWeWuufBN4r1EbtlosNwD0rCzxfKVZ7sXqrCF4";

    try {
      const response = await fetch(SUPABASE_URL, {
        headers: { 
          'apikey': SUPABASE_KEY, 
          'Authorization': `Bearer ${SUPABASE_KEY}` 
        }
      });
      
      const blogs = await response.json();
      const grid = document.getElementById('blog-grid');
      
      if (!Array.isArray(blogs) || blogs.length === 0) {
        grid.innerHTML = `<div class="col-span-full text-center py-12 text-slate-400 text-sm">No articles found in the database.</div>`;
        return;
      }

      // Store in global memory so the modal can read fields without hitting the API again
      localBlogsCache = blogs;

      grid.innerHTML = blogs.map(blog => {
        const imageArray = blog.image_url ? blog.image_url.split(',') : [];
        const displayImage = imageArray[0] || "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=600";

        // Extract description text and apply strict 180-character limit cutoff bounds
        const rawContent = blog.content || '';
        const isTruncated = rawContent.length > 180;
        const displayContent = isTruncated ? `${rawContent.substring(0, 180)}...` : rawContent;

      return `
          <article class="bg-[#0F1424] border border-slate-800 rounded-2xl overflow-hidden shadow-lg flex flex-col hover:border-slate-700 transition-all duration-300 group">
            <div class="h-48 overflow-hidden relative border-b border-slate-800/40 shrink-0">
              <img src="${displayImage}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" alt="Cover">
            </div>
            
            <div class="p-6 flex flex-col justify-between flex-1 space-y-4">
              <div class="space-y-2">
                
                <h2 class="text-xl font-bold text-white tracking-tight leading-snug line-clamp-2">${blog.title || 'Untitled Entry'}</h2>
                <p class="text-slate-400 text-xs leading-relaxed">${displayContent}</p>
              </div>
              
              <div class="pt-2 border-t border-slate-800/20">
                <button onclick="openBlogModal('${blog.id}')" class="inline-flex items-center gap-1 text-xs font-bold text-indigo-400 hover:text-indigo-300 border-b border-transparent hover:border-indigo-300 transition-all pb-0.5">
    Continue Reading →
</button>
              </div>
            </div>
          </article>
        `;
      }).join('');
    } catch (err) { 
      console.error("Error loading blogs", err); 
    }
  }

  document.addEventListener('DOMContentLoaded', loadBlogs);
</script>
</body>
</html>
