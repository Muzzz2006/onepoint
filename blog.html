<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insights | OnePoint</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
  </style>
</head>
<body class="bg-white text-slate-800">

  <div id="header-placeholder"></div>

  <main class="max-w-5xl mx-auto px-6 py-20">
    <div class="text-center mb-16">
      <span class="text-xs font-bold uppercase tracking-[0.2em] text-indigo-600">The OnePoint Journal</span>
      <h1 class="text-4xl md:text-6xl font-black text-[#0F172A] mt-4 mb-6">Architecture Insights</h1>
      <p class="text-slate-500 text-lg max-w-2xl mx-auto">
        Engineering notes, design updates, and platform explorations from our development team.
      </p>
    </div>

    <div id="blog-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="components.js"></script>

  <script>
    // Engine Pipeline to Fetch and Render Database Entries
    async function fetchAndRenderBlogs() {
      const grid = document.getElementById('blog-grid');
      
      // Target API URL and Anonymous Token Key Access Client Identification
      const SUPABASE_URL = "https://menkhsukpmqkvfirbatm.supabase.co/rest/v1/blog?select=*";
      const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1lbmtoc3VrcG1xa3ZmaXJiYXRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMTA5NDEsImV4cCI6MjA5NTg4Njk0MX0.EVx7nAWeWuufBN4r1EbtlosNwD0rCzxfKVZ7sXqrCF4";

      try {
        const response = await fetch(SUPABASE_URL, {
          method: 'GET',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          }
        });

        const blogs = await response.json();

        if (!blogs || blogs.length === 0) {
          grid.innerHTML = `<p class="text-slate-400 text-center col-span-full">No publications found in our journal yet.</p>`;
          return;
        }

        // Sort data chronologically descending by ID sequence
        blogs.sort((a, b) => b.id - a.id);

        grid.innerHTML = blogs.map(blog => {
          // Process internal image array streams safely
          const images = blog.image_url ? blog.image_url.split(',') : [];
          const primaryImage = images[0] || 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=800&q=80';

          // Standardize visual presentation parameters
          const cleanTitle = blog.title || 'Untitled Publication';
          const cleanExcerpt = blog.content ? blog.content.substring(0, 160) + '...' : 'No summary excerpt description data provided for this specific entry layer.';

          return `
            <div class="group bg-white rounded-3xl border border-slate-100 overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 flex flex-col h-full">
              <div class="relative overflow-hidden aspect-[16/10] bg-slate-900">
                <img 
                  src="${primaryImage}" 
                  alt="${cleanTitle}" 
                  class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
                />
              </div>
              <div class="p-6 flex flex-col flex-grow">
                <h3 class="text-xl font-bold text-[#0F172A] group-hover:text-indigo-600 transition-colors line-clamp-2 leading-snug mb-3">
                  ${cleanTitle}
                </h3>
                <p class="text-slate-500 text-sm leading-relaxed line-clamp-3 mb-6">
                  ${cleanExcerpt}
                </p>
                <div class="mt-auto pt-4 border-t border-slate-50">
                  <a href="post.html?id=${blog.id}" class="inline-flex items-center gap-1 text-xs font-bold text-indigo-600 hover:text-indigo-500 border-b border-transparent hover:border-indigo-500 transition-all pb-0.5">
                    Continue Reading →
                  </a>
                </div>
              </div>
            </div>
          `;
        }).join('');

      } catch (error) {
        console.error("Critical Failure accessing remote infrastructure data stream:", error);
        grid.innerHTML = `<p class="text-rose-500 text-center col-span-full">Unable to sync live insights repository stream feed. System offline.</p>`;
      }
    }

    // Initialize logic lifecycle tracking hook execution
    document.addEventListener('DOMContentLoaded', fetchAndRenderBlogs);
  </script>
</body>
</html>
