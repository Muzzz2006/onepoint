<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insights | OnePoint</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-white text-slate-800">

  <div id="header-placeholder"></div>

  <main class="max-w-5xl mx-auto px-6 py-20">
    
    <div class="text-center mb-16">
      <span class="text-xs font-bold uppercase tracking-[0.2em] text-indigo-600">The OnePoint Journal</span>
      <h1 class="text-4xl md:text-6xl font-black text-[#0F172A] mt-4 mb-6">Architecture Insights</h1>
      <p class="text-slate-500 text-lg max-w-2xl mx-auto">Engineering notes, design updates, and platform explorations from our development team.</p>
    </div>

    <div id="blog-grid" class="grid grid-cols-1 gap-12">
      </div>
  </main>

  <div id="blog-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/50 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300">
    <div class="bg-white max-w-2xl w-full max-h-[90vh] rounded-3xl shadow-2xl flex flex-col overflow-hidden transform scale-95 transition-transform duration-300">
      
      <div class="p-6 flex justify-end">
        <button onclick="closeBlogModal()" class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 hover:bg-slate-200 transition-colors font-bold text-slate-600">
          ✕
        </button>
      </div>

      <div id="modal-content" class="overflow-y-auto px-6 pb-8 space-y-6">
        <div id="modal-images" class="flex gap-4 overflow-x-auto pb-4 snap-x">
          </div>
        <h2 id="modal-title" class="text-3xl font-black text-slate-900"></h2>
        <div id="modal-body" class="text-slate-600 leading-relaxed"></div>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>
  
  <script src="components.js"></script>
  <script>
    // Modal Functions
    function openBlogModal(blogId) {
      const modal = document.getElementById('blog-modal');
      modal.classList.remove('opacity-0', 'pointer-events-none');
      modal.querySelector('div').classList.remove('scale-95');
      modal.querySelector('div').classList.add('scale-100');
    }

    function closeBlogModal() {
      const modal = document.getElementById('blog-modal');
      modal.classList.add('opacity-0', 'pointer-events-none');
      modal.querySelector('div').classList.add('scale-95');
      modal.querySelector('div').classList.remove('scale-100');
    }

async function loadBlogs() {
    const SUPABASE_URL = "https://menkhsukpmqkvfirbatm.supabase.co/rest/v1/blogs?select=*";
    const SUPABASE_KEY = "YOUR_ANON_KEY"; // Use your actual key

    try {
      const response = await fetch(SUPABASE_URL, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      });
      const blogs = await response.json();
      
      const grid = document.getElementById('blog-grid');
      grid.innerHTML = blogs.map(blog => `
        <article class="flex flex-col md:flex-row gap-8 items-start border-b border-slate-100 pb-12 group">
          <div class="w-full md:w-1/3 h-64 md:h-56 rounded-2xl overflow-hidden bg-slate-100 flex-shrink-0">
            <img src="${blog.image_url}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
          </div>
          <div class="flex-grow space-y-4">
            <div class="flex items-center gap-3">
              <span class="text-[10px] font-black uppercase tracking-widest text-indigo-600 bg-indigo-50 px-2 py-1 rounded-md">Engineering</span>
            </div>
            <h2 class="text-3xl font-black text-slate-900">${blog.title}</h2>
            <p class="text-slate-600 leading-relaxed">${blog.excerpt}</p>
            <button onclick="openBlogModal('${blog.id}')" class="inline-flex items-center gap-2 text-sm font-bold border-b-2 border-slate-900 hover:border-indigo-600 hover:text-indigo-600 transition-all">
              Continue Reading →
            </button>
          </div>
        </article>
      `).join('');
    } catch (err) { console.error("Error loading blogs", err); }
  }
  loadBlogs();

  </script>
</body>
</html>
