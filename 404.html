<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404: Page Not Found | OnePoint</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    
    .card-stack {
      perspective: 1200px;
    }
    .stacked-card {
      position: absolute;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      transform-style: preserve-3d;
      backface-visibility: hidden;
    }
    /* Smooth scaling feedback loop when hovering individual templates */
    .stacked-card:hover {
      transform: scale(1.04) translateZ(30px) !important;
      z-index: 50 !important;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col pt-14">

   <div id="header-placeholder"></div>
   
  <main class="flex-1 max-w-7xl w-full mx-auto px-6 md:px-12 py-16 flex flex-col md:flex-row items-center justify-between gap-12 relative overflow-hidden">
    
    <div class="text-center md:text-left space-y-4 max-w-xl z-10">
      <h1 class="text-8xl md:text-9xl font-black tracking-tighter text-indigo-600/10 leading-none select-none">
        404
      </h1>
      <h2 class="text-3xl md:text-4xl font-extrabold tracking-tight text-slate-900 relative z-10 leading-tight">
        This structural node does not exist.
      </h2>
      <p class="text-slate-500 text-xs md:text-sm max-w-md mx-auto md:mx-0 leading-relaxed font-medium pb-2">
        The storefront layout, catalog index, or framework entry you are trying to access couldn't be located on our active edge distribution servers.
      </p>
      
      <div class="pt-4 flex flex-col sm:flex-row items-center gap-4 w-full justify-center md:justify-start">
        <a href="./index.html" class="w-full sm:w-auto bg-[#4F46E5] hover:bg-indigo-600 text-white font-bold px-8 py-3.5 rounded-xl text-xs uppercase tracking-widest transition-all shadow-lg shadow-indigo-600/10 hover:scale-[1.01] active:scale-95 text-center">
          Return to Home Page
        </a>
        <button onclick="window.history.back()" class="w-full sm:w-auto bg-white border border-slate-200 hover:border-slate-300 text-slate-600 font-bold px-8 py-3.5 rounded-xl text-xs uppercase tracking-widest transition-all active:scale-95 text-center">
          Go Back A Step
        </button>
      </div>
    </div>

    <div class="w-full max-w-sm h-[340px] md:h-[420px] select-none relative card-stack flex items-center justify-center md:justify-end shrink-0">
      <div class="relative w-[240px] h-[320px] md:mr-16">

        <div class="stacked-card w-[220px] h-[290px] bg-white border border-slate-200/50 rounded-[24px] p-3 shadow-xl z-10 transform -rotate-[16deg] translate-x-[-30px] translate-y-[-10px]" style="transform-origin: center bottom;">
          <div class="w-full h-full rounded-[18px] overflow-hidden bg-slate-100 relative">
            <img src="nexus-preview.png" alt="Nexus Storefront Blueprint" class="w-full h-full object-cover opacity-95">
            <div class="absolute inset-0 bg-slate-950/[0.02]"></div>
          </div>
        </div>

        <div class="stacked-card w-[220px] h-[290px] bg-white border border-slate-200/50 rounded-[24px] p-3 shadow-2xl z-20 transform -rotate-[4deg] translate-x-[-10px] translate-y-[5px]" style="transform-origin: center bottom;">
          <div class="w-full h-full rounded-[18px] overflow-hidden bg-slate-100 relative">
            <img src="aura-preview.png" alt="Aura Creative Interface" class="w-full h-full object-cover opacity-95">
            <div class="absolute inset-0 bg-slate-950/[0.02]"></div>
          </div>
        </div>

        <div class="stacked-card w-[220px] h-[290px] bg-white border border-slate-200/50 rounded-[24px] p-3 shadow-2xl z-30 transform rotate-[8deg] translate-x-[20px] translate-y-[15px]" style="transform-origin: center bottom;">
          <div class="w-full h-full rounded-[18px] overflow-hidden bg-slate-100 relative">
            <img src="brewhaven-preview.png" alt="Brewhaven Commerce Protocol" class="w-full h-full object-cover opacity-95">
            <div class="absolute inset-0 bg-slate-950/[0.02]"></div>
          </div>
        </div>

      </div>
    </div>

  </main>

  <div id="footer-placeholder"></div>
  
  <script src="components.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // 1. Fetch and process header structure from core components
      fetch('./header.html')
        .then(response => {
          if (!response.ok) throw new Error("Header payload sync un-established");
          return response.text();
        })
        .then(htmlData => {
          document.getElementById('header-injection-target').innerHTML = htmlData;
          
          // Re-trigger script processing for mobile menu buttons safely
          const menuBtn = document.getElementById('opMenuToggle');
          if (menuBtn) {
            menuBtn.addEventListener('click', () => {
              const mobileMenu = document.getElementById('mobile-menu');
              if (mobileMenu) {
                mobileMenu.classList.toggle('invisible');
                mobileMenu.classList.toggle('opacity-0');
                mobileMenu.classList.toggle('-translate-y-2');
                mobileMenu.classList.toggle('pointer-events-none');
              }
            });
          }
        })
        .catch(err => console.error("Dynamic layout sync loss:", err));

      // 2. Fetch and process footer parameters natively
      fetch('./footer.html')
        .then(response => {
          if (!response.ok) throw new Error("Footer payload sync un-established");
          return response.text();
        })
        .then(htmlData => {
          document.getElementById('footer-injection-target').innerHTML = htmlData;
        })
        .catch(err => console.error("Dynamic footer mapping exception:", err));
    });
  </script>

</body>
</html>
